<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="fresh-dashboard.css" />
</head>
<body>
  <header class="dashboard-header">
    <h1>Welcome, Admin</h1>
    <button id="fresh-logout" class="btn btn-logout">Logout</button>
  </header>

  <main class="dashboard-grid">
    <article class="dashboard-card">
      <h3>Projects</h3>
      <p>8 active projects</p>
    </article>
    <article class="dashboard-card">
      <h3>Messages</h3>
      <p>5 unread messages</p>
    </article>
    <article class="dashboard-card">
      <h3>Settings</h3>
      <p>Configure account and site settings</p>
    </article>
  </main>

  <script src="fresh-dashboard.js"></script>
</body>
</html>
