<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Calvin Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body.admin-page {
            margin: 0; padding: 0;
            min-height: 100vh;
            width: 100vw;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-primary, 'Inter', sans-serif);
        }
        .admin-card {
            width: min(450px, 92%);
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.15);
            background: var(--card-bg, #111);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            padding: 24px;
            position: relative;
            color: var(--text-primary, #fff);
            animation: pop 0.2s ease;
        }
        @keyframes pop {
            from { transform: translateY(10px) scale(0.98); opacity: 0; }
            to { transform: translateY(0) scale(1); opacity: 1; }
        }
        .card-close {
            position: absolute;
            right: 12px;
            top: 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary, #aaa);
            font-size: 22px;
            cursor: pointer;
        }
        .card-close:hover { color: var(--text-primary, #fff); }
        .admin-card h1 {
            text-align: center;
            margin-bottom: 16px;
            font-size: 24px;
            color: var(--primary-color, #0dc3ff);
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-secondary, #bbb); }
        .form-group input { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border-color, #444); background: var(--bg-secondary, #222); color: var(--text-primary, #fff); }
        .btn { display: inline-flex; justify-content: center; align-items: center; width: 100%; padding: 12px; border-radius: 8px; border: none; font-weight: 600; transition: transform .15s ease, opacity .15s ease; }
        .btn:hover { transform: translateY(-1px); }
        .btn-primary { background: var(--primary, #0081ff); color: #fff; }
        .btn-google { background: #fff; color: #222; border: 1px solid #ccc; margin-top: 10px; }
        .modal-divider { text-align: center; margin: 14px 0; color: var(--text-secondary, #adadad); }
        .hidden { display: none; }
        .error { color: #ff5f5f; margin-top: 8px; font-size: 0.9rem; display: none; }
    </style>
</head>
<body class="admin-page">
    <section class="admin-card">
        <button class="card-close" id="card-close" aria-label="Close">×</button>
        <h1>Admin Login</h1>

        <div id="login-panel">
            <form id="login-form">
                <div class="form-group"><label for="pwd">Password</label><input type="password" id="pwd" name="pwd" required></div>
                <button type="submit" class="btn btn-primary">Login</button>
                <p id="login-error" class="error">Invalid password</p>
            </form>
            <div class="modal-divider">or</div>
            <button id="google-login" class="btn btn-google" type="button">Continue with Google</button>
        </div>

        <div id="create-panel" class="hidden">
            <form id="create-form">
                <div class="form-group"><label for="newpwd">Password</label><input type="password" id="newpwd" required></div>
                <div class="form-group"><label for="confirm">Confirm</label><input type="password" id="confirm" required></div>
                <button type="submit" class="btn btn-primary">Create Password</button>
                <p id="create-error" class="error">Passwords must match</p>
            </form>
            <div class="modal-divider">or</div>
            <button id="google-create" class="btn btn-google" type="button">Continue with Google</button>
        </div>
    </section>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_OAUTH_CLIENT_ID.apps.googleusercontent.com';

        function handleGoogleCredentialResponse(response) {
            if (response && response.credential) {
                localStorage.setItem('adminGoogleToken', response.credential);
                window.location.href = '/admin.html';
                return;
            }
            const err = document.getElementById('login-error');
            err.textContent = 'Google authentication failed';
            err.style.display = 'block';
        }

        function initializeGoogleAuth() {
            if (window.google && GOOGLE_CLIENT_ID) {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleCredentialResponse,
                    auto_select: false,
                    cancel_on_tap_outside: true
                });
            }
        }

        function promptGoogleSignIn() {
            if (!window.google || !GOOGLE_CLIENT_ID) {
                alert('Google auth is not configured. Please set your Google Client ID.');
                return;
            }
            google.accounts.id.prompt();
        }

        async function showAppropriateForm() {
            try {
                const res = await fetch('/api/status');
                const { authenticated, exists } = await res.json();
                if (authenticated) {
                    window.location.href = '/admin.html';
                    return;
                }
                const loginPanel = document.getElementById('login-panel');
                const createPanel = document.getElementById('create-panel');
                if (exists) {
                    loginPanel.classList.remove('hidden');
                    createPanel.classList.add('hidden');
                } else {
                    loginPanel.classList.add('hidden');
                    createPanel.classList.remove('hidden');
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('login-form').addEventListener('submit', async e => {
            e.preventDefault();
            const pwd = document.getElementById('pwd').value;
            const res = await fetch('/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({pwd}) });
            if (res.ok) {
                window.location.href = '/admin.html';
            } else {
                const err = document.getElementById('login-error');
                err.textContent = 'Invalid password';
                err.style.display = 'block';
            }
        });

        document.getElementById('create-form').addEventListener('submit', async e => {
            e.preventDefault();
            const p1 = document.getElementById('newpwd').value;
            const p2 = document.getElementById('confirm').value;
            const err = document.getElementById('create-error');
            if (p1 !== p2) {
                err.textContent = 'Passwords must match';
                err.style.display = 'block';
                return;
            }
            const res = await fetch('/api/password', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({pwd:p1}) });
            if (res.ok) {
                window.location.href = '/admin.html';
            } else {
                err.textContent = 'Could not create password';
                err.style.display = 'block';
            }
        });

        document.getElementById('google-login').addEventListener('click', promptGoogleSignIn);
        document.getElementById('google-create').addEventListener('click', promptGoogleSignIn);
        document.getElementById('card-close').addEventListener('click', () => window.history.back());

        window.addEventListener('DOMContentLoaded', () => {
            initializeGoogleAuth();
            showAppropriateForm();
        });
    </script>
</body>
</html>
