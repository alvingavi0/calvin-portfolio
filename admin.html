alvingavi0<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* login/dashboard layout is handled by global styles */
        .hidden { display:none; }
    </style>
</head>
<body class="admin-page">
    <div id="dashboard" class="admin-dashboard admin-card" style="display:none;">
        <h2 class="section-title">Portfolio Admin</h2>
        <section>
            <h3>Update Contact Info</h3>
            <form id="contact-form-admin">
                <input type="email" id="admin-email" placeholder="Email">
                <input type="text" id="admin-phone" placeholder="Phone">
                <input type="text" id="admin-whatsapp" placeholder="WhatsApp URL">
                <input type="text" id="admin-location" placeholder="Location">
                <button type="submit" class="btn btn-secondary">Save</button>
            </form>
        </section>
        <section>
            <h3>Upload CV</h3>
            <form id="cv-upload" enctype="multipart/form-data">
                <input type="file" name="cv" accept="application/pdf">
                <button type="submit" class="btn btn-secondary">Upload</button>
            </form>
        </section>
        <section>
            <h3>Projects JSON / Folder</h3>
            <p>Upload a <code>projects.json</code> file or a ZIP archive containing one folder per project. The server will extract names and generate JSON automatically.</p>
            <form id="projects-upload" enctype="multipart/form-data">
                <input type="file" name="projects" accept="application/json,application/zip">
                <button type="submit" class="btn btn-secondary">Upload</button>
            </form>
        </section>
        <section>
            <h3>Edit About HTML</h3>
            <textarea id="about-editor" rows="10"></textarea>
            <button id="about-save" class="btn btn-secondary">Save</button>
        </section>
        <button id="logout" class="btn btn-primary" style="margin-top:20px;">Logout</button>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const GOOGLE_CLIENT_ID = 'YOUR_GOOGLE_OAUTH_CLIENT_ID.apps.googleusercontent.com'; // replace with your actual client ID

        function initializeGoogleAuth() {
            if (window.google && GOOGLE_CLIENT_ID) {
                google.accounts.id.initialize({
                    client_id: GOOGLE_CLIENT_ID,
                    callback: handleGoogleCredentialResponse,
                    auto_select: false
                });
            }
        }

        function promptGoogleSignIn() {
            if (!window.google || !GOOGLE_CLIENT_ID) {
                alert('Google auth is not configured. Please set your Google Client ID.');
                return;
            }
            google.accounts.id.prompt();
        }

        function handleGoogleCredentialResponse(response) {
            if (response && response.credential) {
                // Token can be verified on the server side for production security.
                // For this demo, if a credential is returned we treat as success.
                localStorage.setItem('adminGoogleToken', response.credential);
                window.location.href = '/admin.html';
            } else {
                const err = document.getElementById('admin-modal-error');
                if (err) {
                    err.textContent = 'Google authentication failed. Please try again.';
                    err.style.display = 'block';
                }
            }
        }

        async function ensureAdmin() {
            try {
                const res = await fetch('/api/status');
                const {authenticated} = await res.json();
                if (!authenticated) {
                    window.location.href = '/login.html';
                    return;
                }
                // user is authenticated, show admin dashboard
                document.getElementById('dashboard').style.display = 'block';
                await loadAdminData();
            } catch (err) {
                console.error('Admin check failed', err);
                window.location.href = '/login.html';
            }
        }

        async function loadAdminData() {
            const info = await fetch('/api/contact').then(r => r.json());
            document.getElementById('admin-email').value = info.email;
            document.getElementById('admin-phone').value = info.phone;
            document.getElementById('admin-whatsapp').value = info.whatsapp;
            document.getElementById('admin-location').value = info.location;
            const about = await fetch('about.html').then(r => r.text());
            document.getElementById('about-editor').value = about;
        }

        document.getElementById('contact-form-admin').addEventListener('submit', async e => {
            e.preventDefault();
            const payload = {
                email: document.getElementById('admin-email').value,
                phone: document.getElementById('admin-phone').value,
                whatsapp: document.getElementById('admin-whatsapp').value,
                location: document.getElementById('admin-location').value
            };
            await fetch('/api/contact', {
                method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
            });
            alert('Contact updated');
        });

        document.getElementById('cv-upload').addEventListener('submit', async e=>{
            e.preventDefault();
            const form = new FormData(e.target);
            await fetch('/api/upload/cv', {method:'POST', body: form});
            alert('CV uploaded');
        });

        document.getElementById('projects-upload').addEventListener('submit', async e=>{
            e.preventDefault();
            const form = new FormData(e.target);
            await fetch('/api/upload/projects', {method:'POST', body: form});
            alert('Projects JSON uploaded');
        });

        document.getElementById('about-save').addEventListener('click', async ()=>{
            const html = document.getElementById('about-editor').value;
            await fetch('/api/about', {method:'POST', headers:{'Content-Type':'text/html'}, body: html});
            alert('About page saved');
        });

        document.getElementById('logout').addEventListener('click', async ()=>{
            await fetch('/logout');
            window.location.href = '/login.html';
        });

        window.addEventListener('DOMContentLoaded', ensureAdmin);

    </script>
</body>
</html>
